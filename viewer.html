<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLLM Viewer</title>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #1e1e1e;
            color: #d4d4d4;
            line-height: 1.6;
            margin: 0;
            padding: 20px 10%;
            padding-bottom: 100px; /* Space for scrolling */
        }
        #output {
            max-width: 900px;
            margin: auto;
        }
        pre {
            background-color: #2d2d2d;
            padding: 15px;
            border-radius: 8px;
            overflow-x: auto;
        }
        code {
            font-family: "Fira Code", "Consolas", monospace;
            background-color: #2d2d2d;
            padding: 2px 4px;
            border-radius: 4px;
        }
        blockquote {
            border-left: 4px solid #569cd6;
            margin: 0;
            padding-left: 15px;
            color: #9cdcfe;
        }
        .status {
            position: fixed;
            top: 10px;
            right: 10px;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 0.8em;
            font-family: monospace;
        }
        .connected { background-color: #28a745; color: white; }
        .disconnected { background-color: #dc3545; color: white; }
        .thinking-indicator {
            color: #888;
            font-style: italic;
            margin-top: 10px;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }
    </style>
</head>
<body>

    <div id="status" class="status disconnected">Disconnected</div>
    <div id="output"></div>

    <script>
        const outputDiv = document.getElementById('output');
        const statusDiv = document.getElementById('status');
        let rawContent = '';
        let isFirstConnect = true;

        function connect() {
            // Get the WebSocket URL from URL parameters
            // Priority: url > host + port, with sensible defaults
            const urlParams = new URLSearchParams(window.location.search);
            const wsUrl = urlParams.get('url') ||
                          `ws://${urlParams.get('host') || 'localhost'}:${urlParams.get('port') || 8765}`;

            const ws = new WebSocket(wsUrl);

            ws.onopen = () => {
                statusDiv.textContent = 'Connected';
                statusDiv.className = 'status connected';
                isFirstConnect = false; // Mark that we've successfully connected once
            };

            ws.onmessage = (event) => {
                // Handle clear command from C++
                if (event.data.includes('[[CLEAR]]')) {
                    rawContent = '';
                    outputDiv.innerHTML = '';
                    return;
                }

                // Append new tokens
                rawContent += event.data;

                // --- SUPPRESS THINKING BLOCKS ---
                // Strip out everything between <think> and </think>.
                // The '|$' ensures it also hides the text while the block is still actively generating.
                let displayContent = rawContent.replace(/<think>(?:[\s\S]*?<\/think>|[\s\S]*)/gi, '');
                displayContent = displayContent.replace(/(\$\$?)([\s\S]+?)\1/g, (match) => {return match.replace(/\\(?=[^\w\s])/g, '\\\\');});

                // Parse Markdown with breaks=true for regular text
                // Protect code blocks from linebreaking by extracting them first
                const codeBlockPlaceholders = [];

                // Extract code blocks and replace with placeholders
                let tempContent = displayContent.replace(/```([\s\S]*?)```/g, (match, code) => {
                    const placeholder = `%%CODEBLOCK_${codeBlockPlaceholders.length}%%`;
                    codeBlockPlaceholders.push({
                        placeholder: placeholder,
                        code: code.trim(),
                        language: '' // Could extract language from match if needed
                    });
                    return placeholder;
                });

                // Parse the content without code blocks (breaks only affect regular text)
                const customRenderer = new marked.Renderer();

                // Override the code block renderer to restore extracted code blocks safely
                customRenderer.code = function(token) {
                    const codeText = typeof token === 'string' ? token : token.text;
                    const lang = typeof token === 'string' ? arguments[1] : token.lang;

                    const langClass = lang ? ` class="language-${lang}"` : '';
                    const escapedCode = codeText
                        .replace(/&/g, '&amp;')
                        .replace(/</g, '&lt;')
                        .replace(/>/g, '&gt;');
                    return `<pre><code${langClass}>${escapedCode}</code></pre>`;
                };

                let parsedContent = marked.parse(tempContent, {
                    breaks: true,
                    renderer: customRenderer
                });

                // Restore the original code blocks (they preserve whitespace)
                codeBlockPlaceholders.forEach((block, index) => {
                    const escapedCode = block.code
                        .replace(/&/g, '&amp;')
                        .replace(/</g, '&lt;')
                        .replace(/>/g, '&gt;');

                    // Use a callback function () => to prevent '$' character interpolation
                    parsedContent = parsedContent.replace(
                        block.placeholder,
                        () => `<pre><code class="language-${block.language}">${escapedCode}</code></pre>`
                    );
                });

                // Use the parsed HTML directly - no need for additional newline replacement
                outputDiv.innerHTML = parsedContent;

                outputDiv.querySelectorAll('p').forEach(p => {
                  p.innerHTML = p.innerHTML.replace(/(\$\$?)([\s\S]+?)\1/g, (match) => { return match.replace(/<br\s*\/?>/gi, ' '); });
                });

                // 2. Render Math (KaTeX)
                if (window.renderMathInElement) {
                    renderMathInElement(outputDiv, {
                        delimiters: [
                            {left: '$$', right: '$$', display: true},
                            {left: '$', right: '$', display: false},
                            {left: '\\(', right: '\\)', display: false},
                            {left: '\\[', right: '\\]', display: true}
                        ],
                        throwOnError: false
                    });
                }

                // Auto-scroll to bottom
                window.scrollTo(0, document.body.scrollHeight);
            };

            ws.onclose = () => {
                if (isFirstConnect) {
                    // First time connecting - keep trying until successful
                    statusDiv.textContent = 'Connecting...';
                    setTimeout(connect, 2000);
                } else {
                    // Already connected before, now disconnected - just show status
                    statusDiv.textContent = 'Disconnected';
                    statusDiv.className = 'status disconnected';
                    // No auto-reconnect after being connected
                }
            };
        }

        connect();
    </script>
</body>
</html>
