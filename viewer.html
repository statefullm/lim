<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLLM Viewer</title>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #1e1e1e;
            color: #d4d4d4;
            line-height: 1.6;
            margin: 0;
            padding: 20px 10%;
            padding-bottom: 100px;
        }
        #output {
            max-width: 900px;
            margin: auto;
        }
        pre {
            background-color: #2d2d2d;
            padding: 15px;
            border-radius: 8px;
            overflow-x: auto;
        }
        code {
            font-family: "Fira Code", "Consolas", monospace;
            background-color: #2d2d2d;
            padding: 2px 4px;
            border-radius: 4px;
        }
        pre code {
            background-color: transparent;
            padding: 0;
        }
        blockquote {
            border-left: 4px solid #569cd6;
            margin: 0;
            padding-left: 15px;
            color: #9cdcfe;
        }
        .status {
            position: fixed;
            top: 10px;
            right: 10px;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 0.8em;
            font-family: monospace;
        }
        .connected { background-color: #28a745; color: white; }
        .disconnected { background-color: #dc3545; color: white; }

        /* Tool label / result styling (sent as raw HTML from C++) */
        .tool-label {
            color: #ce9178;
            font-weight: bold;
            margin: 12px 0 4px 0;
            font-size: 0.95em;
        }
        .tool-error {
            color: #f48771;
            margin: 12px 0;
            padding: 10px 15px;
            background-color: #3a1e1e;
            border-radius: 6px;
            border-left: 4px solid #f48771;
        }
        .tool-error pre {
            margin: 8px 0 0 0;
            font-size: 0.85em;
        }
        .tool-result {
            color: #b5cea8;
            margin: 12px 0;
            padding: 10px 15px;
            background-color: #1e3a1e;
            border-radius: 6px;
            border-left: 4px solid #888;
        }
        .tool-result pre {
            margin: 8px 0 0 0;
            font-size: 0.85em;
            max-height: 400px;
            overflow-y: auto;
        }
    </style>
</head>
<body>

    <div id="status" class="status disconnected">Disconnected</div>
    <div id="output"></div>

    <script>
        const outputDiv = document.getElementById('output');
        const statusDiv = document.getElementById('status');
        let isFirstConnect = true;

        /* ------------------------------------------------------------------ */
        /*  Segment-based renderer                                            */
        /* ------------------------------------------------------------------ */
        /*  Content arrives tagged with control-character prefixes:
        /*    \x02 = LLM text   → rendered through marked.parse()
        /*    \x03 = Tool label → inserted as raw HTML
        /*    \x04 = Other HTML → inserted as raw HTML (results, user input, etc.)
        /*
        /*  Each segment renders independently. Markdown code fences in one
        /*  LLM segment can never swallow a tool-label div from another segment.
        /* ------------------------------------------------------------------ */

        const SEG_LLM_TEXT   = '\x02';
        const SEG_TOOL_LABEL = '\x03';
        const SEG_HTML       = '\x04';

        // Segments: array of { type, content }
        let segments = [];

        // Merge adjacent segments of the same type into one.
        // Critical: C++ sends \x02 before every small token; without this, each token
        // becomes its own segment and gets independently rendered through marked.parse(),
        // producing broken-up output with excessive block-level wrappers.
        function coalesceSegments() {
            let i = 1;
            while (i < segments.length) {
                if (segments[i].type === segments[i - 1].type && segments[i].content.length > 0) {
                    segments[i - 1].content += segments[i].content;
                    segments.splice(i, 1);
                } else if (segments[i].content.length === 0) {
                    // Drop empty segments
                    segments.splice(i, 1);
                } else {
                    i++;
                }
            }
        }

        function render() {
            let html = '';

            for (const seg of segments) {
                if (seg.type === SEG_LLM_TEXT) {
                    // Render LLM text through marked — code fences, bold, lists, etc.
                    if (typeof marked !== 'undefined') {
                        html += marked.parse(seg.content, { breaks: true });
                    } else {
                        // Fallback if marked hasn't loaded yet
                        const esc = seg.content
                            .replace(/&/g, '&amp;')
                            .replace(/</g, '&lt;')
                            .replace(/>/g, '&gt;');
                        html += '<pre style="white-space:pre-wrap;">' + esc + '</pre>';
                    }
                } else {
                    // Tool labels and other HTML — insert directly
                    html += seg.content;
                }
            }

            outputDiv.innerHTML = html;

            // Render math with KaTeX
            if (typeof renderMathInElement === 'function') {
                renderMathInElement(outputDiv, {
                    delimiters: [
                        { left: '$$',  right: '$$',  display: true  },
                        { left: '$',   right: '$',   display: false },
                        { left: '\\(', right: '\\)', display: false },
                        { left: '\\[', right: '\\]', display: true  }
                    ],
                    throwOnError: false
                });
            }

            // Auto-scroll
            window.scrollTo(0, document.body.scrollHeight);
        }

        /* ------------------------------------------------------------------ */
        /*  WebSocket connection                                              */
        /* ------------------------------------------------------------------ */

        function connect() {
            const urlParams = new URLSearchParams(window.location.search);
            let ws;

            if (urlParams.get('url')) {
                ws = new WebSocket(urlParams.get('url'));
            } else {
                const pageHost = window.location.host;
                const proto = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
                ws = new WebSocket(proto + '//' + pageHost + '/ws');
            }

            ws.onopen = () => {
                statusDiv.textContent = 'Connected';
                statusDiv.className = 'status connected';
                isFirstConnect = false;
            };

            ws.onmessage = (event) => {
                // Clear command (SOH control char 0x01)
                if (event.data.includes('\x01')) {
                    segments = [];
                    outputDiv.innerHTML = '';
                    return;
                }

                // Split incoming data by segment prefix characters.
                // Data may contain multiple segments or partial segments.
                let data = event.data;
                let lastIdx = 0;

                for (let i = 0; i < data.length; i++) {
                    const ch = data[i];
                    if (ch === SEG_LLM_TEXT || ch === SEG_TOOL_LABEL || ch === SEG_HTML) {
                        // Push any trailing untagged text before this prefix as LLM text
                        if (i > lastIdx) {
                            const trailing = data.substring(lastIdx, i);
                            if (segments.length > 0 && segments[segments.length - 1].type === SEG_LLM_TEXT) {
                                segments[segments.length - 1].content += trailing;
                            } else if (trailing.length > 0) {
                                segments.push({ type: SEG_LLM_TEXT, content: trailing });
                            }
                        }
                        // Start a new segment
                        segments.push({ type: ch, content: '' });
                        lastIdx = i + 1;
                    }
                }

                // Remaining text after last prefix goes to the current segment
                if (lastIdx < data.length) {
                    segments[segments.length - 1].content += data.substring(lastIdx);
                } else if (lastIdx === data.length && data.length > 0) {
                    // Message ended exactly on a prefix with no content — shouldn't happen normally
                    // but handle gracefully by adding empty segment
                }

                // Coalesce consecutive segments of the same type so that many small
                // LLM-text tokens (each prefixed with \x02) merge into one block rather
                // than each getting its own independent markdown render pass.
                coalesceSegments();

                render();
            };

            ws.onclose = () => {
                if (isFirstConnect) {
                    statusDiv.textContent = 'Connecting...';
                    setTimeout(connect, 2000);
                } else {
                    statusDiv.textContent = 'Disconnected';
                    statusDiv.className = 'status disconnected';
                }
            };
        }

        connect();
    </script>
</body>
</html>
