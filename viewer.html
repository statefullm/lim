<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLM Live Viewer</title>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #1e1e1e;
            color: #d4d4d4;
            line-height: 1.6;
            margin: 0;
            padding: 20px 10%;
            padding-bottom: 100px; /* Space for scrolling */
        }
        #output {
            max-width: 900px;
            margin: auto;
        }
        pre {
            background-color: #2d2d2d;
            padding: 15px;
            border-radius: 8px;
            overflow-x: auto;
        }
        code {
            font-family: "Fira Code", "Consolas", monospace;
            background-color: #2d2d2d;
            padding: 2px 4px;
            border-radius: 4px;
        }
        blockquote {
            border-left: 4px solid #569cd6;
            margin: 0;
            padding-left: 15px;
            color: #9cdcfe;
        }
        .status {
            position: fixed;
            top: 10px;
            right: 10px;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 0.8em;
            font-family: monospace;
        }
        .connected { background-color: #28a745; color: white; }
        .disconnected { background-color: #dc3545; color: white; }
        .thinking-indicator {
            color: #888;
            font-style: italic;
            margin-top: 10px;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }
    </style>
</head>
<body>

    <div id="status" class="status disconnected">Disconnected</div>
    <div id="output"></div>

    <script>
        const outputDiv = document.getElementById('output');
        const statusDiv = document.getElementById('status');
        let rawContent = '';

        function connect() {
            const ws = new WebSocket('ws://cascade:8765');

            ws.onopen = () => {
                statusDiv.textContent = 'Connected';
                statusDiv.className = 'status connected';
            };

            ws.onmessage = (event) => {
                // Handle clear command from C++
                if (event.data.includes('[[CLEAR]]')) {
                    rawContent = '';
                    outputDiv.innerHTML = '';
                    return;
                }

                // Append new tokens
                rawContent += event.data;

                // --- SUPPRESS THINKING BLOCKS ---
                // Strip out everything between <think> and </think>.
                // The '|$' ensures it also hides the text while the block is still actively generating.
                let displayContent = rawContent.replace(/<think>[\s\S]*?(<\/think>|$)/gi, '');

                // Add a visual indicator if we are currently inside an unclosed <think> block
                const isThinking = /<think>(?!.*<\/think>)/is.test(rawContent);
                if (isThinking) {
                    displayContent += '\n\n<div class="thinking-indicator">🤔 Thinking...</div>';
                }

                // 1. Parse Markdown
                outputDiv.innerHTML = marked.parse(displayContent);

                // 2. Render Math (KaTeX)
                if (window.renderMathInElement) {
                    renderMathInElement(outputDiv, {
                        delimiters: [
                            {left: '$$', right: '$$', display: true},
                            {left: '$', right: '$', display: false},
                            {left: '\\(', right: '\\)', display: false},
                            {left: '\\[', right: '\\]', display: true}
                        ],
                        throwOnError: false
                    });
                }

                // Auto-scroll to bottom
                window.scrollTo(0, document.body.scrollHeight);
            };

            ws.onclose = () => {
                statusDiv.textContent = 'Disconnected - Reconnecting...';
                statusDiv.className = 'status disconnected';
                setTimeout(connect, 2000); // Auto-reconnect
            };
        }

        connect();
    </script>
</body>
</html>
