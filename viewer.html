<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLM Live Viewer</title>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #1e1e1e;
            color: #d4d4d4;
            line-height: 1.6;
            margin: 0;
            padding: 20px 10%;
            padding-bottom: 100px; /* Space for scrolling */
        }
        #output {
            max-width: 900px;
            margin: auto;
        }
        pre {
            background-color: #2d2d2d;
            padding: 15px;
            border-radius: 8px;
            overflow-x: auto;
        }
        code {
            font-family: "Fira Code", "Consolas", monospace;
            background-color: #2d2d2d;
            padding: 2px 4px;
            border-radius: 4px;
        }
        blockquote {
            border-left: 4px solid #569cd6;
            margin: 0;
            padding-left: 15px;
            color: #9cdcfe;
        }
        .status {
            position: fixed;
            top: 10px;
            right: 10px;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 0.8em;
            font-family: monospace;
        }
        .connected { background-color: #28a745; color: white; }
        .disconnected { background-color: #dc3545; color: white; }
        .thinking-indicator {
            color: #888;
            font-style: italic;
            margin-top: 10px;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }
    </style>
</head>
<body>

    <div id="status" class="status disconnected">Disconnected</div>
    <div id="output"></div>

    <script>
        const outputDiv = document.getElementById('output');
        const statusDiv = document.getElementById('status');
        let rawContent = '';

        function connect() {
            const ws = new WebSocket('ws://cascade:8765');

            ws.onopen = () => {
                statusDiv.textContent = 'Connected';
                statusDiv.className = 'status connected';
            };

            ws.onmessage = (event) => {
                // Handle clear command from C++
                if (event.data.includes('[[CLEAR]]')) {
                    rawContent = '';
                    outputDiv.innerHTML = '';
                    return;
                }

                // Append new tokens
                rawContent += event.data;

                // --- SUPPRESS THINKING BLOCKS ---
                // Strip out everything between <think> and </think>.
                // The '|$' ensures it also hides the text while the block is still actively generating.
                let displayContent = rawContent.replace(/[\r\n]*<think>[\s\S]*?<\/think>/gi, '');

                // Add a visual indicator if we are currently inside an unclosed <think> block
                const isThinking = /<think>(?!.*<\/think>)/is.test(rawContent);
                if (isThinking) {
                    displayContent += '\n\n<div class="thinking-indicator">🤔 Thinking...</div>';
                }

                // Parse Markdown with breaks=true for regular text
                // Protect code blocks from linebreaking by extracting them first
                const codeBlockPlaceholders = [];

                // Extract code blocks and replace with placeholders
                let tempContent = displayContent.replace(/```([\s\S]*?)```/g, (match, code) => {
                    const placeholder = `%%CODEBLOCK_${codeBlockPlaceholders.length}%%`;
                    codeBlockPlaceholders.push({
                        placeholder: placeholder,
                        code: code.trim(),
                        language: '' // Could extract language from match if needed
                    });
                    return placeholder;
                });

                // Parse the content without code blocks (breaks only affect regular text)
                const customRenderer = new marked.Renderer();

                // Override the code block renderer to restore extracted code blocks
                customRenderer.code = function(code, language) {
                    const langClass = language ? ` class="language-${language}"` : '';
                    const escapedCode = code
                        .replace(/&/g, '&amp;')
                        .replace(/</g, '&lt;')
                        .replace(/>/g, '&gt;');
                    return `<pre><code${langClass}>${escapedCode}</code></pre>`;
                };

                let parsedContent = marked.parse(tempContent, {
                    breaks: true,
                    renderer: customRenderer
                });

                // Restore the original code blocks (they preserve whitespace)
                codeBlockPlaceholders.forEach((block, index) => {
                    const escapedCode = block.code
                        .replace(/&/g, '&amp;')
                        .replace(/</g, '&lt;')
                        .replace(/>/g, '&gt;');
                    parsedContent = parsedContent.replace(
                        block.placeholder,
                        `<pre><code class="language-${block.language}">${escapedCode}</code></pre>`
                    );
                });

                // Use the parsed HTML directly - no need for additional newline replacement
                outputDiv.innerHTML = parsedContent;

                // 2. Render Math (KaTeX)
                if (window.renderMathInElement) {
                    renderMathInElement(outputDiv, {
                        delimiters: [
                            {left: '$$', right: '$$', display: true},
                            {left: '$', right: '$', display: false},
                            {left: '\\(', right: '\\)', display: false},
                            {left: '\\[', right: '\\]', display: true}
                        ],
                        throwOnError: false
                    });
                }

                // Auto-scroll to bottom
                window.scrollTo(0, document.body.scrollHeight);
            };

            ws.onclose = () => {
                statusDiv.textContent = 'Disconnected - Reconnecting...';
                statusDiv.className = 'status disconnected';
                setTimeout(connect, 2000); // Auto-reconnect
            };
        }

        connect();
    </script>
</body>
</html>
